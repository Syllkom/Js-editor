name: Build and Release Android APK

on:
  push:
    tags:
      - 'v*' # Trigger build on version tags like v1.0.0
  workflow_dispatch: # Enable running this workflow manually from GitHub Actions UI

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x gradlew

      - name: Build Debug and Release APKs
        run: ./gradlew assembleDebug assembleRelease

      - name: Sign Release APK
        # In case the user hasn't set up a custom keystore for releases in secrets yet,
        # we will also upload the Debug APK which is already self-signed by Android build system,
        # making it super easy to install right away without configuring certs.
        run: echo "Apks built successfully"

      - name: Upload APK Assets
        uses: actions/upload-artifact@v4
        with:
          name: Android-App-Apks
          path: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
